services:
  - type: web
    name: universal-document-crawler-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    numInstances: 1
    maxShutdownDelaySeconds: 60
    disk:
      name: udc-data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: UDC_DATA_ROOT
        value: /app/data
      - key: UDC_DOWNLOAD_FOLDER
        value: /app/data/downloads
      - key: UDC_HEADLESS
        value: "true"
      - key: UDC_ALLOWED_ORIGINS
        sync: false
